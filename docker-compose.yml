services:
  # 🔐 Microsserviço de Autenticação
  microservice:
    build:
      context: ../Microsservico_NotaGest_4.0
    container_name: notagest-microservice
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - notagest-network

  # ⚙️ Backend Principal
  backend:
    build:
      context: .
    container_name: notagest-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - NEXT_PUBLIC_AUTH_SERVICE_URL=http://microservice:5001/api/users
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - microservice
    networks:
      - notagest-network

  # 💻 Frontend (Interface)
  frontend:
    build:
      context: ../Frontend_NotaGest_4.0
    container_name: notagest-frontend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NEXT_PUBLIC_AUTH_SERVICE_URL=http://localhost:5001/api/users
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - notagest-network

networks:
  notagest-network:
    driver: bridge
